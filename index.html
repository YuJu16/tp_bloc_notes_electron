<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloc-Notes</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <header id="toolbar">
            <div id="toolbar-left">
                <button id="btn-new" title="Nouveau (Ctrl+N)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="12" y1="18" x2="12" y2="12" />
                        <line x1="9" y1="15" x2="15" y2="15" />
                    </svg>
                    Nouveau
                </button>
                <button id="btn-open" title="Ouvrir (Ctrl+O)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 9v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9" />
                        <path d="M2 9l3-6h14l3 6" />
                    </svg>
                    Ouvrir
                </button>
                <button id="btn-save" title="Sauvegarder (Ctrl+S)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    Sauvegarder
                </button>
            </div>
            <div id="toolbar-right">
                <span id="char-counter">0 caractère</span>
                <button id="btn-theme" title="Basculer le thème" class="icon-btn">
                    <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </div>
        </header>
        <main id="editor-container">
            <textarea id="editor" spellcheck="false" placeholder="Commencez à écrire..."></textarea>
        </main>
        <footer id="statusbar">
            <div id="status-left">
                <span id="status-file">Nouveau fichier</span>
                <span id="status-modified"></span>
            </div>
            <div id="status-right">
                <span>UTF-8</span>
                <span>Electron</span>
            </div>
        </footer>
    </div>
    <script src="renderer.js"></script>
</body>

</html>
